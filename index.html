<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Goals App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:linear-gradient(145deg,#e8f5f0 0%,#f0f7f4 50%,#e4f2ee 100%);min-height:100vh;padding-bottom:60px;}
    .header{background:linear-gradient(135deg,#2d7a6b 0%,#3a9688 60%,#4db6a4 100%);padding:44px 24px 24px;color:white;position:relative;overflow:hidden;}
    .header::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.07);}
    .header::after{content:'';position:absolute;bottom:-50px;left:30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.05);}
    .header-date{font-size:12px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:4px;}
    .header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:0;}
    .nav-bar{background:white;border-bottom:1px solid #e0eeeb;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(45,122,107,0.08);}
    .nav-tabs{display:flex;max-width:480px;margin:0 auto;}
    .nav-tab{flex:1;padding:14px 0;text-align:center;font-size:13px;font-weight:600;color:#7ab5ac;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;font-family:'Inter',sans-serif;background:none;border-top:none;border-left:none;border-right:none;}
    .nav-tab.active{color:#2d7a6b;border-bottom-color:#2d7a6b;}
    .nav-tab span{display:block;font-size:18px;margin-bottom:2px;}
    .container{max-width:480px;margin:0 auto;padding:0 18px;}
    .page{display:none;padding-top:20px;}
    .page.active{display:block;}
    .cat-tabs{display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;}
    .cat-tabs::-webkit-scrollbar{display:none;}
    .cat-tab{flex-shrink:0;padding:7px 16px;border-radius:24px;border:1.5px solid #b2d8d0;cursor:pointer;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;background:white;color:#4a7c75;transition:all 0.2s;white-space:nowrap;}
    .cat-tab.active{background:#2d7a6b;border-color:#2d7a6b;color:white;box-shadow:0 4px 12px rgba(45,122,107,0.25);}
    .section-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#7ab5ac;margin:4px 0 10px;}
    .goal-card{display:flex;align-items:center;gap:14px;background:white;border-radius:16px;border:1.5px solid #ddeee9;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(45,122,107,0.06);}
    .goal-card:hover{box-shadow:0 4px 16px rgba(45,122,107,0.12);transform:translateY(-1px);}
    .goal-card.done{opacity:0.5;}
    .checkbox{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.25s;border:2px solid #b2d8d0;background:transparent;}
    .checkbox.checked{background:linear-gradient(135deg,#2d7a6b,#4db6a4);border-color:transparent;box-shadow:0 2px 8px rgba(45,122,107,0.3);}
    .checkbox.checked::after{content:"✓";color:white;font-size:13px;font-weight:700;}
    .goal-info{flex:1;}
    .goal-text{font-size:15px;font-weight:600;color:#1e3a35;margin:0 0 4px;}
    .goal-text.done-text{text-decoration:line-through;color:#aaa;}
    .cat-pill{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;}
    .del-btn{background:none;border:none;cursor:pointer;font-size:19px;color:#c5dbd7;padding:4px;line-height:1;transition:color 0.2s;}
    .del-btn:hover{color:#e57373;}
    .add-btn{width:100%;padding:15px;border-radius:16px;border:2px dashed #a8d5cb;background:rgba(255,255,255,0.6);cursor:pointer;font-size:14px;color:#3a9688;font-weight:600;font-family:'Inter',sans-serif;transition:all 0.2s;}
    .add-btn:hover{background:white;border-color:#2d7a6b;box-shadow:0 4px 12px rgba(45,122,107,0.1);}
    .add-form{background:white;border-radius:16px;border:1.5px solid #c8e8e1;padding:18px;box-shadow:0 4px 20px rgba(45,122,107,0.1);}
    .add-form input,.add-form select{width:100%;border:1.5px solid #ddeee9;border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Inter',sans-serif;margin-bottom:10px;outline:none;background:#f7fcfb;color:#1e3a35;transition:border-color 0.2s;}
    .add-form input:focus,.add-form select:focus{border-color:#3a9688;background:white;}
    .form-btns{display:flex;gap:8px;}
    .btn-cancel{flex:1;padding:11px;border-radius:10px;border:1.5px solid #ddeee9;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;background:#f7fcfb;color:#4a7c75;}
    .btn-save{flex:1;padding:11px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#2d7a6b,#4db6a4);color:white;box-shadow:0 4px 12px rgba(45,122,107,0.3);}
    .empty{text-align:center;padding:48px 0;color:#8ab5ae;font-size:15px;font-weight:500;}
    /* METRICS */
    .metrics-range{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
    .range-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #b2d8d0;background:white;color:#4a7c75;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;}
    .range-btn.active{background:#2d7a6b;border-color:#2d7a6b;color:white;}
    .metric-card{background:white;border-radius:16px;border:1.5px solid #ddeee9;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(45,122,107,0.06);}
    .metric-card h3{font-size:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#7ab5ac;margin-bottom:12px;}
    .stat-row{display:flex;gap:10px;margin-bottom:4px;}
    .stat-box{flex:1;background:#f0faf7;border-radius:12px;padding:14px 10px;text-align:center;}
    .stat-val{font-size:26px;font-weight:700;color:#2d7a6b;}
    .stat-lbl{font-size:11px;color:#7ab5ac;font-weight:500;margin-top:2px;}
    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .bar-day{font-size:11px;font-weight:600;color:#7ab5ac;width:28px;flex-shrink:0;}
    .bar-bg{flex:1;height:8px;border-radius:4px;background:#e8f5f0;overflow:hidden;}
    .bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2d7a6b,#4db6a4);transition:width 0.6s ease;}
    .bar-pct{font-size:11px;font-weight:600;color:#4a7c75;width:32px;text-align:right;flex-shrink:0;}
    .cat-stat-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f7f4;}
    .cat-stat-row:last-child{border-bottom:none;}
    .cat-stat-name{font-size:13px;font-weight:600;color:#1e3a35;}
    .cat-stat-pct{font-size:13px;font-weight:700;color:#2d7a6b;}
    .streak-num{font-size:42px;font-weight:700;color:#2d7a6b;text-align:center;line-height:1;}
    .streak-lbl{text-align:center;font-size:13px;color:#7ab5ac;margin-top:4px;}
    /* JOURNAL */
    .journal-compose{background:white;border-radius:16px;border:1.5px solid #c8e8e1;padding:18px;margin-bottom:20px;box-shadow:0 2px 8px rgba(45,122,107,0.06);}
    .journal-compose p{font-size:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#7ab5ac;margin-bottom:10px;}
    .journal-compose textarea{width:100%;border:1.5px solid #ddeee9;border-radius:10px;padding:12px 14px;font-size:14px;font-family:'Inter',sans-serif;outline:none;background:#f7fcfb;color:#1e3a35;resize:none;height:70px;transition:border-color 0.2s;line-height:1.5;}
    .journal-compose textarea:focus{border-color:#3a9688;background:white;}
    .journal-save-btn{width:100%;margin-top:10px;padding:11px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#2d7a6b,#4db6a4);color:white;box-shadow:0 4px 12px rgba(45,122,107,0.25);transition:opacity 0.2s;}
    .journal-save-btn:hover{opacity:0.9;}
    .journal-entry{background:white;border-radius:16px;border:1.5px solid #ddeee9;padding:16px 18px;margin-bottom:10px;box-shadow:0 2px 8px rgba(45,122,107,0.05);}
    .journal-entry-date{font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:#7ab5ac;margin-bottom:6px;}
    .journal-entry-text{font-size:15px;color:#1e3a35;line-height:1.6;font-weight:400;}
    .journal-entry-del{float:right;background:none;border:none;cursor:pointer;font-size:16px;color:#c5dbd7;margin-left:8px;transition:color 0.2s;}
    .journal-entry-del:hover{color:#e57373;}
    .today-badge{display:inline-block;background:#e8f5f0;color:#2d7a6b;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle;letter-spacing:0.5px;}
    .journal-add-btn{width:100%;padding:15px;border-radius:16px;border:2px dashed #a8d5cb;background:rgba(255,255,255,0.6);cursor:pointer;font-size:14px;color:#3a9688;font-weight:600;font-family:'Inter',sans-serif;transition:all 0.2s;margin-bottom:16px;}
    .journal-add-btn:hover{background:white;border-color:#2d7a6b;box-shadow:0 4px 12px rgba(45,122,107,0.1);}
  </style>
</head>
<body>

<div class="header">
  <div class="container">
    <p class="header-date" id="date-label"></p>
    <h1>Goals App</h1>
  </div>
</div>

<div class="nav-bar">
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('goals',this)"><span>✦</span>Goals</button>
    <button class="nav-tab" onclick="switchPage('metrics',this)"><span>📊</span>Metrics</button>
    <button class="nav-tab" onclick="switchPage('journal',this)"><span>📓</span>Journal</button>
  </div>
</div>

<!-- GOALS -->
<div class="page active" id="page-goals">
  <div class="container">
    <div class="cat-tabs" id="cat-tabs"></div>
    <p class="section-label" id="section-label">All Goals</p>
    <div id="goals-list"></div>
    <div id="add-area"><button class="add-btn" onclick="showForm()">+ Add New Goal</button></div>
  </div>
</div>

<!-- METRICS -->
<div class="page" id="page-metrics">
  <div class="container">
    <div class="metrics-range">
      <button class="range-btn active" onclick="setRange(7,this)">7 days</button>
      <button class="range-btn" onclick="setRange(30,this)">30 days</button>
      <button class="range-btn" onclick="setRange(90,this)">3 months</button>
      <button class="range-btn" onclick="setRange(9999,this)">All time</button>
    </div>
    <div id="metrics-content"></div>
  </div>
</div>

<!-- JOURNAL -->
<div class="page" id="page-journal">
  <div class="container">
    <div id="journal-compose-area">
      <button class="journal-add-btn" onclick="showJournalForm()">+ Add New Entry</button>
    </div>
    <div id="journal-list"></div>
  </div>
</div>

<script>
const CATS = {
  "Health & Fitness":        {icon:"🏃",color:"#e8f5f0",text:"#2d7a6b"},
  "Habits & Daily Routines": {icon:"🌅",color:"#fff8ee",text:"#b07d2e"},
  "Work & Productivity":     {icon:"💼",color:"#eef4fd",text:"#2e5fa3"},
  "Personal Growth":         {icon:"🌱",color:"#f0faf0",text:"#2e7a3a"},
};

let goals = JSON.parse(localStorage.getItem('goals_v1') || 'null') || [
  {id:1,text:"30 min workout",category:"Health & Fitness",done:false},
  {id:2,text:"Drink 8 glasses of water",category:"Health & Fitness",done:false},
  {id:3,text:"Make bed in the morning",category:"Habits & Daily Routines",done:false},
  {id:4,text:"No phone first 30 min",category:"Habits & Daily Routines",done:false},
  {id:5,text:"Complete top 3 work tasks",category:"Work & Productivity",done:false},
  {id:6,text:"Read for 20 minutes",category:"Personal Growth",done:false},
];
let history = JSON.parse(localStorage.getItem('history_v1') || '[]');
let journal  = JSON.parse(localStorage.getItem('journal_v1')  || '[]');
let activeCat = "All";
let metricsRange = 7;

function todayStr(){return new Date().toISOString().slice(0,10);}

function saveState(){
  localStorage.setItem('goals_v1',JSON.stringify(goals));
  const byCat={};
  Object.keys(CATS).forEach(c=>{
    const cg=goals.filter(g=>g.category===c);
    byCat[c]={total:cg.length,done:cg.filter(g=>g.done).length};
  });
  const entry={date:todayStr(),total:goals.length,done:goals.filter(g=>g.done).length,byCat};
  const idx=history.findIndex(h=>h.date===todayStr());
  if(idx>=0) history[idx]=entry; else history.push(entry);
  localStorage.setItem('history_v1',JSON.stringify(history));
}
function saveJournalState(){localStorage.setItem('journal_v1',JSON.stringify(journal));}

// NAV
function switchPage(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
  if(page==='metrics') renderMetrics();
  if(page==='journal') renderJournal();
}

document.getElementById('date-label').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

// ── GOALS ──
function renderGoals(){
  const tabs=["All",...Object.keys(CATS)];
  document.getElementById('cat-tabs').innerHTML=tabs.map(t=>
    '<button class="cat-tab '+(activeCat===t?'active':'')+'" onclick="setCat(''+t+'')">'+
    (t==="All"?"✦ All":CATS[t].icon+" "+t.split(" ")[0])+'</button>'
  ).join('');
  document.getElementById('section-label').textContent=
    activeCat==="All"?"All Goals":CATS[activeCat].icon+" "+activeCat;
  const filtered=activeCat==="All"?goals:goals.filter(g=>g.category===activeCat);
  const list=document.getElementById('goals-list');
  if(!filtered.length){list.innerHTML='<div class="empty">No goals here yet ✨</div>';return;}
  list.innerHTML=filtered.map(g=>{
    const cat=CATS[g.category];
    return '<div class="goal-card '+(g.done?'done':'')+'" onclick="toggle('+g.id+')">'+
      '<div class="checkbox '+(g.done?'checked':'')+'"></div>'+
      '<div class="goal-info">'+
      '<p class="goal-text '+(g.done?'done-text':'')+'">'+g.text+'</p>'+
      '<span class="cat-pill" style="background:'+cat.color+';color:'+cat.text+'">'+cat.icon+' '+g.category+'</span>'+
      '</div>'+
      '<button class="del-btn" onclick="event.stopPropagation();removeGoal('+g.id+')">×</button>'+
      '</div>';
  }).join('');
}
function toggle(id){goals=goals.map(g=>g.id===id?{...g,done:!g.done}:g);saveState();renderGoals();}
function removeGoal(id){goals=goals.filter(g=>g.id!==id);saveState();renderGoals();}
function setCat(t){activeCat=t;renderGoals();}
function showForm(){
  document.getElementById('add-area').innerHTML=
    '<div class="add-form">'+
    '<input id="new-text" placeholder="What's your goal?" onkeydown="if(event.key==='Enter')saveGoal()" autofocus/>'+
    '<select id="new-cat">'+Object.keys(CATS).map(c=>'<option>'+c+'</option>').join('')+'</select>'+
    '<div class="form-btns">'+
    '<button class="btn-cancel" onclick="cancelForm()">Cancel</button>'+
    '<button class="btn-save" onclick="saveGoal()">Add Goal</button>'+
    '</div></div>';
  document.getElementById('new-text').focus();
}
function saveGoal(){
  const t=document.getElementById('new-text').value.trim();
  const c=document.getElementById('new-cat').value;
  if(!t)return;
  goals.push({id:Date.now(),text:t,category:c,done:false});
  saveState();cancelForm();renderGoals();
}
function cancelForm(){
  document.getElementById('add-area').innerHTML='<button class="add-btn" onclick="showForm()">+ Add New Goal</button>';
}

// ── METRICS ──
function setRange(n,btn){
  metricsRange=n;
  document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMetrics();
}

function renderMetrics(){
  // Build days array
  const days=[];
  for(let i=metricsRange-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }
  const today=todayStr();
  const snapMap={};
  history.forEach(h=>snapMap[h.date]=h);
  // Live today snapshot
  const byCatToday={};
  Object.keys(CATS).forEach(c=>{
    const cg=goals.filter(g=>g.category===c);
    byCatToday[c]={total:cg.length,done:cg.filter(g=>g.done).length};
  });
  snapMap[today]={date:today,total:goals.length,done:goals.filter(g=>g.done).length,byCat:byCatToday};

  const relevant=days.map(d=>snapMap[d]).filter(Boolean);
  const totalDays=relevant.length;
  const avgPct=totalDays?Math.round(relevant.reduce((a,h)=>a+(h.total?h.done/h.total*100:0),0)/totalDays):0;
  const perfectDays=relevant.filter(h=>h.total>0&&h.done===h.total).length;

  let streak=0;
  for(let i=days.length-1;i>=0;i--){
    const s=snapMap[days[i]];
    if(s&&s.total>0&&s.done===s.total)streak++;else break;
  }

  const catAvgs={};
  Object.keys(CATS).forEach(c=>{
    const slices=relevant.filter(h=>h.byCat&&h.byCat[c]&&h.byCat[c].total>0);
    catAvgs[c]=slices.length?Math.round(slices.reduce((a,h)=>a+h.byCat[c].done/h.byCat[c].total*100,0)/slices.length):0;
  });

  // Always show last 7 days for bar chart
  const barDays=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);barDays.push(d.toISOString().slice(0,10));}
  const dayLabels=['Su','Mo','Tu','We','Th','Fr','Sa'];

  document.getElementById('metrics-content').innerHTML=
    '<div class="metric-card">'+
    '<h3>Summary</h3>'+
    '<div class="stat-row">'+
    '<div class="stat-box"><div class="stat-val">'+avgPct+'%</div><div class="stat-lbl">Avg completion</div></div>'+
    '<div class="stat-box"><div class="stat-val">'+perfectDays+'</div><div class="stat-lbl">Perfect days</div></div>'+
    '<div class="stat-box"><div class="stat-val">'+totalDays+'</div><div class="stat-lbl">Days tracked</div></div>'+
    '</div></div>'+
    '<div class="metric-card">'+
    '<h3>Current Streak</h3>'+
    '<div class="streak-num">'+streak+(streak>0?'🔥':'')+'</div>'+
    '<div class="streak-lbl">consecutive perfect days</div>'+
    '</div>'+
    '<div class="metric-card">'+
    '<h3>Last 7 Days</h3>'+
    barDays.map(d=>{
      const s=snapMap[d];
      const pct=s&&s.total?Math.round(s.done/s.total*100):0;
      const dow=new Date(d+'T12:00:00').getDay();
      return '<div class="bar-row">'+
        '<span class="bar-day">'+dayLabels[dow]+'</span>'+
        '<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%"></div></div>'+
        '<span class="bar-pct">'+pct+'%</span>'+
        '</div>';
    }).join('')+
    '</div>'+
    '<div class="metric-card">'+
    '<h3>By Category</h3>'+
    Object.keys(CATS).map(c=>
      '<div class="cat-stat-row">'+
      '<span class="cat-stat-name">'+CATS[c].icon+' '+c+'</span>'+
      '<span class="cat-stat-pct">'+catAvgs[c]+'%</span>'+
      '</div>'
    ).join('')+
    '</div>';
}

// ── JOURNAL ──
function showJournalForm(){
  const today=todayStr();
  const existing=journal.find(e=>e.date===today);
  document.getElementById('journal-compose-area').innerHTML=
    '<div class="journal-compose">'+
    '<p>Today's highlight</p>'+
    '<textarea id="journal-input" placeholder="What stood out to you today?">'+
    (existing?existing.text:'')+
    '</textarea>'+
    '<div class="form-btns" style="margin-top:10px;">'+
    '<button class="btn-cancel" onclick="hideJournalForm()">Cancel</button>'+
    '<button class="btn-save" onclick="saveJournal()">Save Entry</button>'+
    '</div></div>';
  document.getElementById('journal-input').focus();
}
function hideJournalForm(){
  document.getElementById('journal-compose-area').innerHTML=
    '<button class="journal-add-btn" onclick="showJournalForm()">+ Add New Entry</button>';
}
function saveJournal(){
  const text=document.getElementById('journal-input').value.trim();
  if(!text)return;
  const today=todayStr();
  journal=journal.filter(e=>e.date!==today);
  journal.unshift({date:today,text});
  saveJournalState();
  hideJournalForm();
  renderJournal();
}
function deleteJournal(date){
  journal=journal.filter(e=>e.date!==date);
  saveJournalState();renderJournal();
}
function renderJournal(){
  const today=todayStr();
  const list=document.getElementById('journal-list');
  if(!journal.length){
    list.innerHTML='<div class="empty" style="padding-top:16px;">No entries yet ✨<br><span style="font-size:13px;opacity:0.7">Tap above to write your first one!</span></div>';
    return;
  }
  list.innerHTML=journal.map(e=>{
    const d=new Date(e.date+'T12:00:00');
    const label=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    const isToday=e.date===today;
    return '<div class="journal-entry">'+
      '<div class="journal-entry-date">'+label+
      (isToday?'<span class="today-badge">TODAY</span>':'')+
      '<button class="journal-entry-del" onclick="deleteJournal(''+e.date+'')">×</button></div>'+
      '<p class="journal-entry-text">'+e.text+'</p>'+
      '</div>';
  }).join('');
}

renderGoals();
</script>
</body>
</html>
