<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#f2f2ee;min-height:100vh;padding-bottom:80px;}
        .header{background:linear-gradient(135deg,#2d7a6b 0%,#3a9688 60%,#4db6a4 100%);padding:44px 24px 24px;color:white;position:relative;overflow:hidden;}
        .header::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.07);}
        .header::after{content:'';position:absolute;bottom:-50px;left:30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.05);}
        .header-date{font-size:12px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:4px;}
        .header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;}
        .nav-bar{background:white;border-bottom:1px solid #e0eeeb;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(45,122,107,0.08);}
        .nav-tabs{display:flex;max-width:480px;margin:0 auto;}
        .nav-tab{flex:1;padding:12px 0 10px;text-align:center;font-size:12px;font-weight:600;color:#7ab5ac;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;font-family:'Inter',sans-serif;background:none;border-top:none;border-left:none;border-right:none;}
        .nav-tab.active{color:#2d7a6b;border-bottom-color:#2d7a6b;}
        .tab-icon{display:block;font-size:20px;margin-bottom:3px;}
        .tab-label{display:block;}
        .container{max-width:480px;margin:0 auto;padding:0 18px;}
        .page{display:none;padding-top:18px;}
        .page.active{display:block;}

        /* Month header */
        .month-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
        .month-name{font-size:24px;font-weight:800;color:#1a1a1a;}
        .month-name .chevron{font-size:14px;color:#7ab5ac;margin-left:4px;}
        .days-left{font-size:13px;font-weight:600;color:#7ab5ac;background:#eef6f3;padding:5px 12px;border-radius:20px;}

        /* Subtabs */
        .subtabs{display:flex;gap:0;background:#e8e8e3;border-radius:12px;padding:4px;margin-bottom:16px;}
        .subtab{flex:1;padding:8px;border-radius:8px;border:none;background:none;font-size:13px;font-weight:600;color:#888;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
        .subtab.active{background:white;color:#2d7a6b;box-shadow:0 2px 8px rgba(0,0,0,0.1);}

        /* Goal bar cards */
        .goal-bar-card{position:relative;border-radius:20px;background:#e0dfd9;overflow:hidden;margin-bottom:13px;cursor:pointer;height:86px;transition:transform 0.12s,box-shadow 0.12s;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
        .goal-bar-card:active{transform:scale(0.97);}
        .goal-bar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:20px;transition:width 0.7s cubic-bezier(0.4,0,0.2,1);}
        .goal-bar-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 18px 0 16px;}
        .goal-bar-left{display:flex;align-items:center;gap:11px;}
        .goal-bar-emoji{font-size:28px;line-height:1;flex-shrink:0;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.15));}
        .goal-bar-title{font-size:15px;font-weight:700;color:#1a1a1a;line-height:1.25;max-width:180px;}
        .goal-bar-time{font-size:11px;color:rgba(0,0,0,0.4);margin-top:2px;font-weight:500;}
        .goal-bar-right{text-align:right;flex-shrink:0;}
        .goal-bar-count{font-size:20px;font-weight:800;color:#1a1a1a;line-height:1;}
        .goal-bar-togo{font-size:11px;color:rgba(0,0,0,0.4);font-weight:500;margin-top:1px;}
        .goal-bar-done-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#1a1a1a;opacity:0.5;margin-right:4px;vertical-align:middle;}

        /* Del button */
        .goal-del-btn{position:absolute;top:7px;right:10px;background:rgba(0,0,0,0.12);border:none;cursor:pointer;font-size:13px;color:rgba(0,0,0,0.5);z-index:2;line-height:1;padding:3px 6px;border-radius:6px;transition:all 0.2s;}
        .goal-del-btn:hover{background:rgba(220,80,80,0.2);color:#c0392b;}

        /* Add form */
        .add-btn{width:100%;padding:15px;border-radius:18px;border:2px dashed #b8d8d0;background:rgba(255,255,255,0.5);cursor:pointer;font-size:14px;color:#3a9688;font-weight:600;font-family:'Inter',sans-serif;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
        .add-btn:hover{background:white;border-color:#2d7a6b;}
        .add-form{background:white;border-radius:18px;border:1.5px solid #c8e8e1;padding:18px;box-shadow:0 4px 20px rgba(45,122,107,0.1);}
        .add-form input,.add-form select{width:100%;border:1.5px solid #ddeee9;border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Inter',sans-serif;margin-bottom:10px;outline:none;background:#f7fcfb;color:#1e3a35;}
        .add-form input:focus,.add-form select:focus{border-color:#3a9688;background:white;}
        .form-btns{display:flex;gap:8px;}
        .btn-cancel{flex:1;padding:11px;border-radius:10px;border:1.5px solid #ddeee9;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;background:#f7fcfb;color:#4a7c75;}
        .btn-save{flex:1;padding:11px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#2d7a6b,#4db6a4);color:white;}
        .empty{text-align:center;padding:48px 0;color:#8ab5ae;font-size:15px;font-weight:500;}

        /* History */
        .history-card{background:white;border-radius:16px;border:1.5px solid #e8e8e3;padding:16px 18px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
        .history-card-header{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
        .history-card-name{font-size:14px;font-weight:700;color:#1a1a1a;min-width:120px;}
        .history-bar-wrap{flex:1;height:8px;background:#e8e8e3;border-radius:4px;overflow:hidden;}
        .history-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2d7a6b,#4db6a4);transition:width 0.6s ease;}
        .history-pct{font-size:14px;font-weight:700;color:#2d7a6b;min-width:40px;text-align:right;}
        .history-chevron{font-size:11px;color:#aaa;transition:transform 0.2s;flex-shrink:0;}
        .history-chevron.open{transform:rotate(180deg);}
        .history-goal-rows{display:none;margin-top:12px;border-top:1px solid #f0f0ea;padding-top:10px;}
        .history-goal-rows.open{display:block;}
        .history-goal-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f7f7f2;}
        .history-goal-row:last-child{border-bottom:none;}
        .history-goal-name{font-size:13px;color:#555;font-weight:500;}
        .history-goal-stat{font-size:13px;font-weight:700;color:#2d7a6b;}
        .history-goal-mini{width:60px;height:5px;background:#e8e8e3;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin:0 8px;}
        .history-goal-mini-fill{height:100%;background:#4db6a4;border-radius:3px;}

        /* Metrics */
        .metrics-range{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
        .range-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #b2d8d0;background:white;color:#4a7c75;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;}
        .range-btn.active{background:#2d7a6b;border-color:#2d7a6b;color:white;}
        .metric-card{background:white;border-radius:16px;border:1.5px solid #ddeee9;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(45,122,107,0.06);}
        .metric-card h3{font-size:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#7ab5ac;margin-bottom:12px;}
        .stat-row{display:flex;gap:10px;margin-bottom:4px;}
        .stat-box{flex:1;background:#f0faf7;border-radius:12px;padding:14px 10px;text-align:center;}
        .stat-val{font-size:26px;font-weight:700;color:#2d7a6b;}
        .stat-lbl{font-size:11px;color:#7ab5ac;font-weight:500;margin-top:2px;}
        .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
        .bar-day{font-size:11px;font-weight:600;color:#7ab5ac;width:28px;flex-shrink:0;}
        .bar-bg{flex:1;height:8px;border-radius:4px;background:#e8f5f0;overflow:hidden;}
        .bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2d7a6b,#4db6a4);transition:width 0.6s ease;}
        .bar-pct{font-size:11px;font-weight:600;color:#4a7c75;width:32px;text-align:right;flex-shrink:0;}
        .cat-stat-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f7f4;}
        .cat-stat-row:last-child{border-bottom:none;}
        .cat-stat-name{font-size:13px;font-weight:600;color:#1e3a35;}
        .cat-stat-pct{font-size:13px;font-weight:700;color:#2d7a6b;}
        .streak-num{font-size:42px;font-weight:700;color:#2d7a6b;text-align:center;line-height:1;}
        .streak-lbl{text-align:center;font-size:13px;color:#7ab5ac;margin-top:4px;}

        /* Journal */
        .journal-add-btn{width:100%;padding:15px;border-radius:16px;border:2px dashed #a8d5cb;background:rgba(255,255,255,0.6);cursor:pointer;font-size:14px;color:#3a9688;font-weight:600;font-family:'Inter',sans-serif;transition:all 0.2s;margin-bottom:16px;}
        .journal-add-btn:hover{background:white;border-color:#2d7a6b;}
        .journal-compose{background:white;border-radius:16px;border:1.5px solid #c8e8e1;padding:18px;margin-bottom:16px;box-shadow:0 2px 8px rgba(45,122,107,0.06);}
        .journal-compose-label{font-size:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#7ab5ac;margin-bottom:10px;}
        .journal-compose textarea{width:100%;border:1.5px solid #ddeee9;border-radius:10px;padding:12px 14px;font-size:14px;font-family:'Inter',sans-serif;outline:none;background:#f7fcfb;color:#1e3a35;resize:none;height:70px;line-height:1.5;}
        .journal-compose textarea:focus{border-color:#3a9688;background:white;}
        .journal-entry{background:white;border-radius:16px;border:1.5px solid #ddeee9;padding:16px 18px;margin-bottom:10px;box-shadow:0 2px 8px rgba(45,122,107,0.05);}
        .journal-entry-date{font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:#7ab5ac;margin-bottom:6px;}
        .journal-entry-text{font-size:15px;color:#1e3a35;line-height:1.6;}
        .journal-entry-del{float:right;background:none;border:none;cursor:pointer;font-size:16px;color:#c5dbd7;margin-left:8px;}
        .journal-entry-del:hover{color:#e57373;}
        .today-badge{display:inline-block;background:#e8f5f0;color:#2d7a6b;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle;}
    </style>
</head>
<body>
    <div class="header">
        <p class="header-date" id="date-label"></p>
        <h1>Goals App</h1>
    </div>
    <div class="nav-bar">
        <div class="nav-tabs" id="nav-tabs">
            <button class="nav-tab active" data-page="goals"><span class="tab-icon">&#10022;</span><span class="tab-label">Goals</span></button>
            <button class="nav-tab" data-page="metrics"><span class="tab-icon">&#128202;</span><span class="tab-label">Metrics</span></button>
            <button class="nav-tab" data-page="journal"><span class="tab-icon">&#128218;</span><span class="tab-label">Journal</span></button>
        </div>
    </div>
    <div class="container">
        <div class="page active" id="page-goals">
            <div class="month-header">
                <span class="month-name" id="month-label"></span>
                <span class="days-left" id="days-left-label"></span>
            </div>
            <div class="subtabs">
                <button class="subtab active" onclick="setSubtab('goals')">Goals</button>
                <button class="subtab" onclick="setSubtab('history')">History</button>
            </div>
            <div id="goals-subpage">
                <div id="goals-list"></div>
                <div id="add-area"><button class="add-btn" onclick="showForm()">&#43; Add New Goal</button></div>
            </div>
            <div id="history-subpage" style="display:none">
                <div id="history-list"></div>
            </div>
        </div>
        <div class="page" id="page-metrics">
            <div class="metrics-range">
                <button class="range-btn active" onclick="setRange(7,this)">7 days</button>
                <button class="range-btn" onclick="setRange(30,this)">30 days</button>
                <button class="range-btn" onclick="setRange(90,this)">3 months</button>
                <button class="range-btn" onclick="setRange(365,this)">All time</button>
            </div>
            <div id="metrics-content"></div>
        </div>
        <div class="page" id="page-journal">
            <div id="journal-compose-area"><button class="journal-add-btn" onclick="showJournalForm()">&#43; Add New Entry</button></div>
            <div id="journal-list"></div>
        </div>
    </div>
    <script>
        document.getElementById("nav-tabs").addEventListener("click",function(e){
            var btn=e.target.closest(".nav-tab");
            if(!btn)return;
            var page=btn.getAttribute("data-page");
            document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
            document.querySelectorAll(".nav-tab").forEach(function(t){t.classList.remove("active");});
            document.getElementById("page-"+page).classList.add("active");
            btn.classList.add("active");
            if(page==="metrics")renderMetrics();
            if(page==="journal")renderJournal();
        });

        var CATS={
            "Health & Fitness":{icon:"&#127939;",color:"#FF6B6B"},
            "Habits & Daily Routines":{icon:"&#127749;",color:"#FFBE76"},
            "Work & Productivity":{icon:"&#128188;",color:"#74B9FF"},
            "Personal Growth":{icon:"&#127807;",color:"#55EFC4"}
        };

        var goals=JSON.parse(localStorage.getItem("goals_v1")||"null")||[
            {id:1,text:"30 min workout",category:"Health & Fitness"},
            {id:2,text:"Drink 8 glasses of water",category:"Health & Fitness"},
            {id:3,text:"Make bed in the morning",category:"Habits & Daily Routines"},
            {id:4,text:"No phone first 30 min",category:"Habits & Daily Routines"},
            {id:5,text:"Complete top 3 work tasks",category:"Work & Productivity"},
            {id:6,text:"Read for 20 minutes",category:"Personal Growth"}
        ];

        var completions=JSON.parse(localStorage.getItem("completions_v1")||"{}");

        // Migrate old done:true goals into completions
        (function(){
            var today=new Date().toISOString().slice(0,10);
            var changed=false;
            goals.forEach(function(g){
                if(g.done===true){
                    if(!completions[today])completions[today]=[];
                    if(completions[today].indexOf(g.id)===-1)completions[today].push(g.id);
                    delete g.done;
                    changed=true;
                }
            });
            if(changed){
                localStorage.setItem("goals_v1",JSON.stringify(goals));
                localStorage.setItem("completions_v1",JSON.stringify(completions));
            }
        })();

        var goalHistory=JSON.parse(localStorage.getItem("history_v1")||"[]");
        var journal=JSON.parse(localStorage.getItem("journal_v1")||"[]");
        var metricsRange=7;

        // Date helpers
        function todayStr(){var d=new Date();return d.getFullYear()+"-"+padNum(d.getMonth()+1)+"-"+padNum(d.getDate());}
        function getDaysInMonth(y,m){return new Date(y,m+1,0).getDate();}
        function padNum(n){return n<10?"0"+n:""+n;}
        var MONTH_NAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];

        function getMonthlyCount(goalId,y,m){
            var prefix=y+"-"+padNum(m+1);
            var count=0;
            Object.keys(completions).forEach(function(date){
                if(date.startsWith(prefix)&&completions[date]&&completions[date].indexOf(goalId)!==-1)count++;
            });
            return count;
        }

        function getLastLabel(goalId){
            var dates=Object.keys(completions).filter(function(d){
                return completions[d]&&completions[d].indexOf(goalId)!==-1;
            }).sort().reverse();
            if(!dates.length)return "not started";
            var diff=Math.floor((new Date()-new Date(dates[0]+"T12:00:00"))/86400000);
            if(diff<=0)return "done today &#10003;";
            if(diff===1)return "1d ago";
            return diff+"d ago";
        }

        function saveState(){
            localStorage.setItem("goals_v1",JSON.stringify(goals));
            localStorage.setItem("completions_v1",JSON.stringify(completions));
            var today=todayStr();
            var todayDone=completions[today]?completions[today].length:0;
            var byCat={};
            Object.keys(CATS).forEach(function(c){
                var cg=goals.filter(function(g){return g.category===c;});
                byCat[c]={total:cg.length,done:cg.filter(function(g){return completions[today]&&completions[today].indexOf(g.id)!==-1;}).length};
            });
            var entry={date:today,total:goals.length,done:todayDone,byCat:byCat};
            var idx=goalHistory.findIndex(function(h){return h.date===today;});
            if(idx>=0)goalHistory[idx]=entry;else goalHistory.push(entry);
            localStorage.setItem("history_v1",JSON.stringify(goalHistory));
        }
        function saveJournalState(){localStorage.setItem("journal_v1",JSON.stringify(journal));}

        document.getElementById("date-label").textContent=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

        function updateMonthHeader(){
            var now=new Date();
            var dl=getDaysInMonth(now.getFullYear(),now.getMonth())-now.getDate();
            document.getElementById("month-label").innerHTML=MONTH_NAMES[now.getMonth()]+" <span class='chevron'>&#9662;</span>";
            document.getElementById("days-left-label").textContent=dl+(dl===1?" day left":" days left");
        }

        function setSubtab(tab){
            document.querySelectorAll(".subtab").forEach(function(b){b.classList.remove("active");});
            event.target.classList.add("active");
            document.getElementById("goals-subpage").style.display=tab==="goals"?"block":"none";
            document.getElementById("history-subpage").style.display=tab==="history"?"block":"none";
            if(tab==="history")renderHistory();
        }

        function toggle(id){
            var today=todayStr();
            if(!completions[today])completions[today]=[];
            var idx=completions[today].indexOf(id);
            if(idx===-1)completions[today].push(id);
            else completions[today].splice(idx,1);
            saveState();
            var g=goals.find(function(x){return x.id===id;});
            var card=document.querySelector(".goal-bar-card[data-id='"+id+"']");
            if(card&&g)refreshCard(card,g);
            if(document.getElementById("page-metrics").classList.contains("active"))renderMetrics();
        }

        function refreshCard(card,g){
            var now=new Date();
            var dim=getDaysInMonth(now.getFullYear(),now.getMonth());
            var done=getMonthlyCount(g.id,now.getFullYear(),now.getMonth());
            var pct=Math.round(done/dim*100);
            var fill=card.querySelector(".goal-bar-fill");fill.style.width=(done>0?Math.max(pct,4)+"%":"0%");if(done>0){var g2=goals.find(function(x){return x.id===g.id;});fill.style.background=CATS[g2.category].color;}else{fill.style.background="transparent";}
            card.querySelector(".goal-bar-count").textContent=done+" / "+dim;
            card.querySelector(".goal-bar-togo").textContent=(dim-done)+" to go";
            card.querySelector(".goal-bar-time").innerHTML=getLastLabel(g.id);
        }

        function renderGoals(){
            updateMonthHeader();
            var now=new Date();
            var dim=getDaysInMonth(now.getFullYear(),now.getMonth());
            var list=document.getElementById("goals-list");
            if(!goals.length){list.innerHTML="<div class='empty'>No goals yet &#10024;</div>";return;}
            list.innerHTML=goals.map(function(g){
                var cat=CATS[g.category];
                var done=getMonthlyCount(g.id,now.getFullYear(),now.getMonth());
                var pct=Math.round(done/dim*100);
                return "<div class='goal-bar-card' data-id='"+g.id+"' onclick='toggle("+g.id+")'>"
                    +"<div class='goal-bar-fill' style='width:"+(done>0?Math.max(pct,4)+"%;background:"+cat.color:"0%")+"'></div>"
                    +"<div class='goal-bar-inner'>"
                    +"<div class='goal-bar-left'>"
                    +"<span class='goal-bar-emoji'>"+cat.icon+"</span>"
                    +"<div><div class='goal-bar-title'>"+g.text+"</div>"
                    +"<div class='goal-bar-time'>"+getLastLabel(g.id)+"</div></div>"
                    +"</div>"
                    +"<div class='goal-bar-right'>"
                    +"<div class='goal-bar-count'>"+done+" / "+dim+"</div>"
                    +"<div class='goal-bar-togo'>"+(dim-done)+" to go</div>"
                    +"</div></div>"
                    +"<button class='goal-del-btn' onclick='event.stopPropagation();removeGoal("+g.id+")'>&times;</button>"
                    +"</div>";
            }).join("");
        }

        function removeGoal(id){goals=goals.filter(function(g){return g.id!==id;});saveState();renderGoals();}

        function showForm(){
            document.getElementById("add-area").innerHTML=
                "<div class='add-form'>"
                +"<input id='new-text' placeholder='What is your goal?' onkeydown='if(event.key==\"Enter\")saveGoal()' autofocus/>"
                +"<select id='new-cat'>"+Object.keys(CATS).map(function(c){return "<option>"+c+"</option>";}).join("")+"</select>"
                +"<div class='form-btns'>"
                +"<button class='btn-cancel' onclick='cancelForm()'>Cancel</button>"
                +"<button class='btn-save' onclick='saveGoal()'>Add Goal</button>"
                +"</div></div>";
            document.getElementById("new-text").focus();
        }
        function saveGoal(){
            var t=document.getElementById("new-text").value.trim();
            var c=document.getElementById("new-cat").value;
            if(!t)return;
            goals.push({id:Date.now(),text:t,category:c});
            saveState();cancelForm();renderGoals();
        }
        function cancelForm(){
            document.getElementById("add-area").innerHTML="<button class='add-btn' onclick='showForm()'>&#43; Add New Goal</button>";
        }

        function renderHistory(){
            var list=document.getElementById("history-list");
            var monthSet={};
            Object.keys(completions).forEach(function(date){monthSet[date.slice(0,7)]=true;});
            var now=new Date();
            monthSet[now.getFullYear()+"-"+padNum(now.getMonth()+1)]=true;
            var months=Object.keys(monthSet).sort().reverse();
            if(!months.length){list.innerHTML="<div class='empty'>No history yet &#10024;</div>";return;}
            list.innerHTML=months.map(function(ym){
                var parts=ym.split("-");
                var y=parseInt(parts[0]),m=parseInt(parts[1])-1;
                var dim=getDaysInMonth(y,m);
                var totalPossible=goals.length*dim;
                var totalDone=0;
                goals.forEach(function(g){totalDone+=getMonthlyCount(g.id,y,m);});
                var pct=totalPossible>0?Math.round(totalDone/totalPossible*100):0;
                var rows=goals.map(function(g){
                    var d=getMonthlyCount(g.id,y,m);
                    var gp=Math.round(d/dim*100);
                    return "<div class='history-goal-row'>"
                        +"<span class='history-goal-name'>"+CATS[g.category].icon+" "+g.text+"</span>"
                        +"<span class='history-goal-stat'>"
                        +"<span class='history-goal-mini'><span class='history-goal-mini-fill' style='width:"+gp+"%'></span></span>"
                        +d+"/"+dim+" ("+gp+"%)</span></div>";
                }).join("");
                var isCurrentMonth=(y===now.getFullYear()&&m===now.getMonth());
                return "<div class='history-card'>"
                    +"<div class='history-card-header' onclick='toggleHistMonth(\"hm-"+ym+"\")'>"
                    +"<span class='history-card-name'>"+MONTH_NAMES[m]+" "+y+"</span>"
                    +"<div class='history-bar-wrap'><div class='history-bar-fill' style='width:"+pct+"%'></div></div>"
                    +"<span class='history-pct'>"+pct+"%</span>"
                    +"<span class='history-chevron"+(isCurrentMonth?" open":"")+"' id='chev-hm-"+ym+"'>&#9660;</span>"
                    +"</div>"
                    +"<div class='history-goal-rows"+(isCurrentMonth?" open":"")+"' id='hm-"+ym+"'>"+rows+"</div>"
                    +"</div>";
            }).join("");
        }

        function toggleHistMonth(id){
            var el=document.getElementById(id);
            var ch=document.getElementById("chev-"+id);
            if(!el)return;
            var open=el.classList.toggle("open");
            if(ch)ch.classList.toggle("open",open);
        }

        function setRange(n,btn){
            metricsRange=n;
            document.querySelectorAll(".range-btn").forEach(function(b){b.classList.remove("active");});
            btn.classList.add("active");
            renderMetrics();
        }

        function renderMetrics(){
            var days=[];
            for(var i=metricsRange-1;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);days.push(d.getFullYear()+"-"+padNum(d.getMonth()+1)+"-"+padNum(d.getDate()));}
            var today=todayStr();
            var snapMap={};
            goalHistory.forEach(function(h){snapMap[h.date]=h;});
            var todayDone=completions[today]?completions[today].length:0;
            var byCatToday={};
            Object.keys(CATS).forEach(function(c){
                var cg=goals.filter(function(g){return g.category===c;});
                byCatToday[c]={total:cg.length,done:cg.filter(function(g){return completions[today]&&completions[today].indexOf(g.id)!==-1;}).length};
            });
            snapMap[today]={date:today,total:goals.length,done:todayDone,byCat:byCatToday};
            var relevant=days.map(function(d){return snapMap[d];}).filter(Boolean);
            var totalDays=relevant.length;
            var avgPct=totalDays?Math.round(relevant.reduce(function(a,h){return a+(h.total?h.done/h.total*100:0);},0)/totalDays):0;
            var perfectDays=relevant.filter(function(h){return h.total>0&&h.done===h.total;}).length;
            var streak=0;
            for(var j=days.length-1;j>=0;j--){var s=snapMap[days[j]];if(s&&s.total>0&&s.done===s.total)streak++;else break;}
            var catAvgs={};
            Object.keys(CATS).forEach(function(c){
                var sl=relevant.filter(function(h){return h.byCat&&h.byCat[c]&&h.byCat[c].total>0;});
                catAvgs[c]=sl.length?Math.round(sl.reduce(function(a,h){return a+h.byCat[c].done/h.byCat[c].total*100;},0)/sl.length):0;
            });
            var barDays=[];
            for(var k=6;k>=0;k--){var bd=new Date();bd.setDate(bd.getDate()-k);barDays.push(bd.getFullYear()+"-"+padNum(bd.getMonth()+1)+"-"+padNum(bd.getDate()));}
            var dl=["Su","Mo","Tu","We","Th","Fr","Sa"];
            document.getElementById("metrics-content").innerHTML=
                "<div class='metric-card'><h3>Summary</h3><div class='stat-row'>"
                +"<div class='stat-box'><div class='stat-val'>"+avgPct+"%</div><div class='stat-lbl'>Avg completion</div></div>"
                +"<div class='stat-box'><div class='stat-val'>"+perfectDays+"</div><div class='stat-lbl'>Perfect days</div></div>"
                +"<div class='stat-box'><div class='stat-val'>"+totalDays+"</div><div class='stat-lbl'>Days tracked</div></div>"
                +"</div></div>"
                +"<div class='metric-card'><h3>Current Streak</h3>"
                +"<div class='streak-num'>"+streak+(streak>0?" &#128293;":"")+"</div>"
                +"<div class='streak-lbl'>consecutive perfect days</div></div>"
                +"<div class='metric-card'><h3>Last 7 Days</h3>"
                +barDays.map(function(d){
                    var s=snapMap[d];var pct=s&&s.total?Math.round(s.done/s.total*100):0;
                    var dow=new Date(d+"T12:00:00").getDay();
                    return "<div class='bar-row'><span class='bar-day'>"+dl[dow]+"</span>"
                        +"<div class='bar-bg'><div class='bar-fill' style='width:"+pct+"%'></div></div>"
                        +"<span class='bar-pct'>"+pct+"%</span></div>";
                }).join("")+"</div>"
                +"<div class='metric-card'><h3>By Category</h3>"
                +Object.keys(CATS).map(function(c){
                    return "<div class='cat-stat-row'>"
                        +"<span class='cat-stat-name'>"+CATS[c].icon+" "+c+"</span>"
                        +"<span class='cat-stat-pct'>"+catAvgs[c]+"%</span></div>";
                }).join("")+"</div>";
        }

        function showJournalForm(){
            var today=todayStr();
            var existing=journal.find(function(e){return e.date===today;});
            document.getElementById("journal-compose-area").innerHTML=
                "<div class='journal-compose'><p class='journal-compose-label'>Today's Highlight</p>"
                +"<textarea id='journal-input' placeholder='What stood out to you today?'>"+(existing?existing.text:"")+"</textarea>"
                +"<div class='form-btns' style='margin-top:10px;'>"
                +"<button class='btn-cancel' onclick='hideJournalForm()'>Cancel</button>"
                +"<button class='btn-save' onclick='saveJournal()'>Save Entry</button>"
                +"</div></div>";
            document.getElementById("journal-input").focus();
        }
        function hideJournalForm(){
            document.getElementById("journal-compose-area").innerHTML="<button class='journal-add-btn' onclick='showJournalForm()'>&#43; Add New Entry</button>";
        }
        function saveJournal(){
            var text=document.getElementById("journal-input").value.trim();
            if(!text)return;
            var today=todayStr();
            journal=journal.filter(function(e){return e.date!==today;});
            journal.unshift({date:today,text:text});
            saveJournalState();hideJournalForm();renderJournal();
        }
        function deleteJournal(date){
            journal=journal.filter(function(e){return e.date!==date;});
            saveJournalState();renderJournal();
        }
        function renderJournal(){
            var today=todayStr();
            var list=document.getElementById("journal-list");
            if(!journal.length){
                list.innerHTML="<div class='empty'>No entries yet &#10024;<br><span style='font-size:13px;opacity:0.7'>Tap above to write your first one!</span></div>";
                return;
            }
            list.innerHTML=journal.map(function(e){
                var d=new Date(e.date+"T12:00:00");
                var label=d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
                var isToday=e.date===today;
                return "<div class='journal-entry'>"
                    +"<div class='journal-entry-date'>"+label
                    +(isToday?"<span class='today-badge'>TODAY</span>":"")
                    +"<button class='journal-entry-del' onclick='deleteJournal(\""+e.date+"\")'>&times;</button></div>"
                    +"<p class='journal-entry-text'>"+e.text+"</p></div>";
            }).join("");
        }

        renderGoals();
        renderMetrics();
    </script>
</body>
</html>
