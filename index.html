<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#f2f2ee;min-height:100vh;padding-bottom:80px;}
        .header{background:linear-gradient(135deg,#2d7a6b 0%,#3a9688 60%,#4db6a4 100%);padding:44px 24px 24px;color:white;position:relative;overflow:hidden;}
        .header::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.07);}
        .header::after{content:'';position:absolute;bottom:-50px;left:30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.05);}
        .header-date{font-size:12px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:4px;}
        .header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;}
        .nav-bar{background:white;border-bottom:1px solid #e0eeeb;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(45,122,107,0.08);}
        .nav-tabs{display:flex;max-width:480px;margin:0 auto;}
        .nav-tab{flex:1;padding:12px 0 10px;text-align:center;font-size:12px;font-weight:600;color:#7ab5ac;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;font-family:'Inter',sans-serif;background:none;border-top:none;border-left:none;border-right:none;}
        .nav-tab.active{color:#2d7a6b;border-bottom-color:#2d7a6b;}
        .tab-icon{display:block;font-size:20px;margin-bottom:3px;}
        .tab-label{display:block;}
        .container{max-width:480px;margin:0 auto;padding:0 18px;}
        .page{display:none;padding-top:18px;}
        .page.active{display:block;}

        /* Month header */
        .month-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
        .month-name{font-size:24px;font-weight:800;color:#1a1a1a;}
        .month-name .chevron{font-size:14px;color:#7ab5ac;margin-left:4px;}
        .days-left{font-size:13px;font-weight:600;color:#7ab5ac;background:#eef6f3;padding:5px 12px;border-radius:20px;}

        /* Subtabs */
        .subtabs{display:flex;gap:0;background:#e8e8e3;border-radius:12px;padding:4px;margin-bottom:16px;}
        .subtab{flex:1;padding:8px;border-radius:8px;border:none;background:none;font-size:13px;font-weight:600;color:#888;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
        .subtab.active{background:white;color:#2d7a6b;box-shadow:0 2px 8px rgba(0,0,0,0.1);}

        /* Goal bar cards */
        .goal-bar-card{position:relative;border-radius:20px;background:#e0dfd9;overflow:hidden;margin-bottom:13px;cursor:pointer;height:86px;transition:transform 0.12s,box-shadow 0.12s;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
        .goal-bar-card:active{transform:scale(0.97);}
        .goal-bar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:20px;transition:width 0.7s cubic-bezier(0.4,0,0.2,1);}
        .goal-bar-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 18px 0 16px;}
        .goal-bar-left{display:flex;align-items:center;gap:11px;}
        .goal-bar-emoji{font-size:28px;line-height:1;flex-shrink:0;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.15));}
        .goal-bar-title{font-size:15px;font-weight:700;color:#1a1a1a;line-height:1.25;max-width:180px;}
        .goal-bar-time{font-size:11px;color:rgba(0,0,0,0.4);margin-top:2px;font-weight:500;}
        .goal-bar-right{text-align:right;flex-shrink:0;}
        .goal-bar-count{font-size:20px;font-weight:800;color:#1a1a1a;line-height:1;}
        .goal-bar-togo{font-size:11px;color:rgba(0,0,0,0.4);font-weight:500;margin-top:1px;}
        .goal-bar-done-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#1a1a1a;opacity:0.5;margin-right:4px;vertical-align:middle;}

        /* Del button */
        .goal-del-btn{position:absolute;top:7px;right:10px;background:rgba(0,0,0,0.12);border:none;cursor:pointer;font-size:13px;color:rgba(0,0,0,0.5);z-index:2;line-height:1;padding:3px 6px;border-radius:6px;transition:all 0.2s;}
        .goal-del-btn:hover{background:rgba(220,80,80,0.2);color:#c0392b;}

        /* Add form */
        .add-btn{width:100%;padding:15px;border-radius:18px;border:2px dashed #b8d8d0;background:rgba(255,255,255,0.5);cursor:pointer;font-size:14px;color:#3a9688;font-weight:600;font-family:'Inter',sans-serif;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
        .add-btn:hover{background:white;border-color:#2d7a6b;}
        .add-form{background:white;border-radius:18px;border:1.5px solid #c8e8e1;padding:18px;box-shadow:0 4px 20px rgba(45,122,107,0.1);}
        .add-form input,.add-form select{width:100%;border:1.5px solid #ddeee9;border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Inter',sans-serif;margin-bottom:10px;outline:none;background:#f7fcfb;color:#1e3a35;}
        .add-form input:focus,.add-form select:focus{border-color:#3a9688;background:white;}
        .form-btns{display:flex;gap:8px;}
        .btn-cancel{flex:1;padding:11px;border-radius:10px;border:1.5px solid #ddeee9;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;background:#f7fcfb;color:#4a7c75;}
        .btn-save{flex:1;padding:11px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#2d7a6b,#4db6a4);color:white;}
        .empty{text-align:center;padding:48px 0;color:#8ab5ae;font-size:15px;font-weight:500;}

        /* History */
        .history-card{background:white;border-radius:16px;border:1.5px solid #e8e8e3;padding:16px 18px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
        .history-card-header{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
        .history-card-name{font-size:14px;font-weight:700;color:#1a1a1a;min-width:120px;}
        .history-bar-wrap{flex:1;height:8px;background:#e8e8e3;border-radius:4px;overflow:hidden;}
        .history-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2d7a6b,#4db6a4);transition:width 0.6s ease;}
        .history-pct{font-size:14px;font-weight:700;color:#2d7a6b;min-width:40px;text-align:right;}
        .history-chevron{font-size:11px;color:#aaa;transition:transform 0.2s;flex-shrink:0;}
        .history-chevron.open{transform:rotate(180deg);}
        .history-goal-rows{display:none;margin-top:12px;border-top:1px solid #f0f0ea;padding-top:10px;}
        .history-goal-rows.open{display:block;}
        .history-goal-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f7f7f2;}
        .history-goal-row:last-child{border-bottom:none;}
        .history-goal-name{font-size:13px;color:#555;font-weight:500;}
        .history-goal-stat{font-size:13px;font-weight:700;color:#2d7a6b;}
        .history-goal-mini{width:60px;height:5px;background:#e8e8e3;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin:0 8px;}
        .history-goal-mini-fill{height:100%;background:#4db6a4;border-radius:3px;}

        /* Metrics */
        .metrics-range{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
        .range-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #b2d8d0;background:white;color:#4a7c75;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;}
        .range-btn.active{background:#2d7a6b;border-color:#2d7a6b;color:white;}
        .metric-card{background:white;border-radius:16px;border:1.5px solid #ddeee9;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(45,122,107,0.06);}
        .metric-card h3{font-size:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#7ab5ac;margin-bottom:12px;}
        .stat-row{display:flex;gap:10px;margin-bottom:4px;}
        .stat-box{flex:1;background:#f0faf7;border-radius:12px;padding:14px 10px;text-align:center;}
        .stat-val{font-size:26px;font-weight:700;color:#2d7a6b;}
        .stat-lbl{font-size:11px;color:#7ab5ac;font-weight:500;margin-top:2px;}
        .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
        .bar-day{font-size:11px;font-weight:600;color:#7ab5ac;width:28px;flex-shrink:0;}
        .bar-bg{flex:1;height:8px;border-radius:4px;background:#e8f5f0;overflow:hidden;}
        .bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2d7a6b,#4db6a4);transition:width 0.6s ease;}
        .bar-pct{font-size:11px;font-weight:600;color:#4a7c75;width:32px;text-align:right;flex-shrink:0;}
        .cat-stat-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f7f4;}
        .cat-stat-row:last-child{border-bottom:none;}
        .cat-stat-name{font-size:13px;font-weight:600;color:#1e3a35;}
        .cat-stat-pct{font-size:13px;font-weight:700;color:#2d7a6b;}
        .streak-num{font-size:42px;font-weight:700;color:#2d7a6b;text-align:center;line-height:1;}
        .streak-lbl{text-align:center;font-size:13px;color:#7ab5ac;margin-top:4px;}

        /* Tasks */
        .task-item{background:white;border-radius:16px;border:1.5px solid #e8e8e3;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 6px rgba(0,0,0,0.05);transition:transform 0.12s;}.task-item.done-task{opacity:0.45;}.task-check{width:22px;height:22px;border-radius:6px;border:2px solid #b8d8d0;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;transition:all 0.2s;background:white;}.task-check.checked{background:#2d7a6b;border-color:#2d7a6b;}.task-label{flex:1;font-size:15px;font-weight:500;color:#1a1a1a;cursor:pointer;line-height:1.4;}.task-label.done-text{text-decoration:line-through;color:#aaa;}.task-del{background:none;border:none;cursor:pointer;font-size:18px;color:#ddd;padding:2px 6px;flex-shrink:0;line-height:1;transition:color 0.2s;}.task-del:hover{color:#e57373;}

                /* Logs */
        .log-rating-row{display:flex;gap:5px;margin:8px 0 14px;}
        .log-rating-btn{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid #e0e0e0;background:white;font-size:20px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;text-align:center;line-height:1.4;}
        .log-rating-btn.sel{border-color:#2d7a6b;background:#eef6f3;transform:scale(1.08);box-shadow:0 2px 8px rgba(45,122,107,0.15);}
        .log-entry-card{background:white;border-radius:16px;border:1.5px solid #ddeee9;padding:16px 18px;margin-bottom:10px;box-shadow:0 2px 8px rgba(45,122,107,0.05);}
        .log-entry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
        .log-entry-date{font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:#7ab5ac;}
        .log-entry-actions{display:flex;gap:6px;align-items:center;}
        .log-entry-btn{background:none;border:none;cursor:pointer;padding:0;line-height:1;}
        .log-entry-edit{font-size:13px;color:#7ab5ac;font-weight:600;padding:0 4px;}
        .log-entry-del{font-size:15px;color:#c5dbd7;}
        .log-entry-del:hover{color:#e57373;}
        .log-entry-rating{font-size:22px;margin-bottom:6px;line-height:1;}
        .log-entry-text{font-size:15px;color:#1e3a35;line-height:1.6;}
        .log-graph-wrap{background:white;border-radius:16px;border:1.5px solid #ddeee9;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(45,122,107,0.06);}
        .log-graph-title{font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#7ab5ac;margin-bottom:8px;}
        .log-month-card{background:white;border-radius:16px;border:1.5px solid #e8e8e3;padding:0;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,0.05);overflow:hidden;}
        .log-month-hdr{display:flex;align-items:center;gap:8px;padding:14px 16px;cursor:pointer;user-select:none;}
        .log-month-nm{font-size:14px;font-weight:700;color:#1a1a1a;flex:1;}
        .log-month-cnt{font-size:12px;color:#aaa;font-weight:500;}
        .log-month-avg{font-size:20px;line-height:1;}
        .log-month-avg-num{font-size:14px;font-weight:700;color:#2d7a6b;min-width:28px;text-align:right;}
        .log-month-chev{font-size:11px;color:#aaa;transition:transform 0.2s;flex-shrink:0;}
        .log-month-chev.open{transform:rotate(180deg);}
        .log-month-body{display:none;border-top:1px solid #f0f0ea;padding:0 16px;}
        .log-month-body.open{display:block;}
        .log-hist-entry{padding:10px 0;border-bottom:1px solid #f7f7f2;}
        .log-hist-entry:last-child{border-bottom:none;}
        .log-hist-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
        .log-hist-date{font-size:11px;font-weight:700;color:#7ab5ac;text-transform:uppercase;letter-spacing:0.5px;}
        .log-hist-rating{font-size:18px;line-height:1;}
        .log-hist-text{font-size:14px;color:#1e3a35;line-height:1.5;}
        .today-badge{display:inline-block;background:#e8f5f0;color:#2d7a6b;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle;}

        /* Handwriting modal */
        .hw-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;}
        .hw-panel{background:white;border-radius:20px;width:100%;max-width:480px;box-shadow:0 8px 48px rgba(0,0,0,0.22);}
        .hw-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #f0f0ea;border-radius:20px 20px 0 0;background:white;}
        .hw-title{font-size:15px;font-weight:700;color:#1a1a1a;}
        .hw-close{background:none;border:none;cursor:pointer;font-size:22px;color:#aaa;line-height:1;padding:0;}
        .hw-close:hover{color:#333;}
        .hw-body{padding:16px 20px 8px;}
        .hw-hint{font-size:12px;color:#aaa;text-align:center;margin-bottom:12px;font-weight:500;line-height:1.5;}
        .hw-textarea{width:100%;height:260px;border:1.5px solid #ddeee9;border-radius:14px;padding:10px 16px;font-size:21px;font-family:'Inter',sans-serif;outline:none;background-image:repeating-linear-gradient(transparent,transparent 35px,#e4f0ec 35px,#e4f0ec 36px);background-size:100% 36px;background-position:0 10px;line-height:36px;padding-top:10px;color:#1e3a35;resize:none;-webkit-user-select:text;touch-action:auto;}
        .hw-textarea:focus{border-color:#3a9688;}
        .hw-actions{display:flex;gap:10px;padding:14px 20px 20px;border-radius:0 0 20px 20px;background:white;}
        .hw-btn-clear{flex:1;padding:13px;border-radius:12px;border:1.5px solid #ddeee9;background:#f7fcfb;color:#4a7c75;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;}
        .hw-btn-use{flex:2;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#2d7a6b,#4db6a4);color:white;font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;}
        .pencil-btn{background:white;border:1.5px solid #ddeee9;border-radius:10px;padding:8px 10px;cursor:pointer;font-size:18px;line-height:1;transition:all 0.2s;flex-shrink:0;align-self:flex-start;}
        .pencil-btn:hover{background:#eef6f3;border-color:#3a9688;}
    </style>
</head>
<body>
    <div class="header">
        <p class="header-date" id="date-label"></p>
        <h1>Goals App</h1>
    </div>
    <div class="nav-bar">
        <div class="nav-tabs" id="nav-tabs">
            <button class="nav-tab active" data-page="goals"><span class="tab-icon">&#10022;</span><span class="tab-label">Goals</span></button>
            <button class="nav-tab" data-page="tasks"><span class="tab-icon">&#9745;</span><span class="tab-label">Tasks</span></button><button class="nav-tab" data-page="metrics"><span class="tab-icon">&#128202;</span><span class="tab-label">Metrics</span></button>
            <button class="nav-tab" data-page="logs"><span class="tab-icon">&#128221;</span><span class="tab-label">Logs</span></button>
        </div>
    </div>
    <div class="container">
        <div class="page active" id="page-goals">
            <div class="month-header">
                <span class="month-name" id="month-label"></span>
                <span class="days-left" id="days-left-label"></span>
            </div>
            <div class="subtabs">
                <button class="subtab active" onclick="setSubtab('goals')">Goals</button>
                <button class="subtab" onclick="setSubtab('history')">History</button>
            </div>
            <div id="goals-subpage">
                <div id="goals-list"></div>
                <div id="add-area"><button class="add-btn" onclick="showForm()">&#43; Add New Goal</button></div>
            </div>
            <div id="history-subpage" style="display:none">
                <div id="history-list"></div>
            </div>
        </div>
        <div class="page" id="page-tasks">
            <div class="month-header">
                <span class="month-name" id="tasks-month-label"></span>
                <span class="days-left" id="tasks-count-label"></span>
            </div>
            <div id="task-add-area"><button class="add-btn" onclick="showTaskForm()">&#43; Add Monthly Task</button></div>
            <div id="tasks-list"></div>
        </div>
        <div class="page" id="page-metrics">
            <div class="subtabs" style="margin-bottom:16px"><button class="subtab active" onclick="setRange(7,this)">Weekly</button><button class="subtab" onclick="setRange(30,this)">Monthly</button></div>
            <div id="metrics-content"></div>
        </div>
        <div class="page" id="page-logs">
            <div class="subtabs" id="logs-subtabs">
                <button class="subtab active" onclick="setLogsTab('today',this)">Today</button>
                <button class="subtab" onclick="setLogsTab('history',this)">History</button>
            </div>
            <div id="logs-today"></div>
            <div id="logs-history" style="display:none"></div>
        </div>
    </div>
    <script>
        document.getElementById("nav-tabs").addEventListener("click",function(e){
            var btn=e.target.closest(".nav-tab");
            if(!btn)return;
            var page=btn.getAttribute("data-page");
            document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
            document.querySelectorAll(".nav-tab").forEach(function(t){t.classList.remove("active");});
            document.getElementById("page-"+page).classList.add("active");
            btn.classList.add("active");
            if(page==="metrics")renderMetrics();
            if(page==="tasks")renderTasks();
            if(page==="logs")renderLogs();
        });

        var CATS={
            "Health & Fitness":{icon:"&#127939;",color:"#FF6B6B"},
            "Habits & Daily Routines":{icon:"&#127749;",color:"#FFBE76"},
            "Work & Productivity":{icon:"&#128188;",color:"#74B9FF"},
            "Personal Growth":{icon:"&#127807;",color:"#55EFC4"}
        };

        var goals=JSON.parse(localStorage.getItem("goals_v1")||"null")||[
            {id:1,text:"30 min workout",category:"Health & Fitness"},
            {id:2,text:"Drink 8 glasses of water",category:"Health & Fitness"},
            {id:3,text:"Make bed in the morning",category:"Habits & Daily Routines"},
            {id:4,text:"No phone first 30 min",category:"Habits & Daily Routines"},
            {id:5,text:"Complete top 3 work tasks",category:"Work & Productivity"},
            {id:6,text:"Read for 20 minutes",category:"Personal Growth"}
        ];

        var completions=JSON.parse(localStorage.getItem("completions_v1")||"{}");

        // Migrate old done:true goals into completions
        (function(){
            var today=new Date().toISOString().slice(0,10);
            var changed=false;
            goals.forEach(function(g){
                if(g.done===true){
                    if(!completions[today])completions[today]=[];
                    if(completions[today].indexOf(g.id)===-1)completions[today].push(g.id);
                    delete g.done;
                    changed=true;
                }
            });
            if(changed){
                localStorage.setItem("goals_v1",JSON.stringify(goals));
                localStorage.setItem("completions_v1",JSON.stringify(completions));
            }
        })();

        var goalHistory=JSON.parse(localStorage.getItem("history_v1")||"[]");
        var journal=JSON.parse(localStorage.getItem("journal_v1")||"[]");

        var logs=JSON.parse(localStorage.getItem('logs_v1')||'[]');
        var LOG_EMOJIS=['','😔','😐','🙂','😊','🤩'];
        var LOG_LBLS=['','Rough','Okay','Good','Great','Amazing'];
        function saveLogsState(){localStorage.setItem('logs_v1',JSON.stringify(logs));}
        function setLogsTab(tab,btn){
          document.querySelectorAll('#logs-subtabs .subtab').forEach(function(b){b.classList.remove('active');});
          btn.classList.add('active');
          document.getElementById('logs-today').style.display=tab==='today'?'block':'none';
          document.getElementById('logs-history').style.display=tab==='history'?'block':'none';
          if(tab==='history')renderLogsHistory();
        }
        function buildLogGraph(){
          var now=new Date(),y=now.getFullYear(),m=now.getMonth();
          var dim=getDaysInMonth(y,m);var prefix=y+'-'+padNum(m+1);var pts=[];

function renderMetrics(){
var today=todayStr(),now=new Date();
var days=[];
if(metricsRange===7){
var sow=new Date(now);sow.setDate(now.getDate()-now.getDay());
for(var wi=0;wi<7;wi++){var wd=new Date(sow);wd.setDate(sow.getDate()+wi);days.push(wd.getFullYear()+'-'+padNum(wd.getMonth()+1)+'-'+padNum(wd.getDate()));}
}
var snapMap={};goalHistory.forEach(function(h){snapMap[h.date]=h;});
var todayDone=completions[today]?completions[today].length:0;
snapMap[today]={date:today,total:goals.length,done:todayDone};
var avgPct=0,totalDone=0,streak=0;
if(metricsRange===7){
var totalPossible=goals.length*7;
totalDone=days.reduce(function(acc,d){return acc+(completions[d]?completions[d].length:0);},0);
avgPct=totalPossible>0?Math.round(totalDone/totalPossible*100):0;
}else{
var monthSetS={};Object.keys(completions).forEach(function(date){if(completions[date]&&completions[date].length)monthSetS[date.slice(0,7)]=true;});
monthSetS[now.getFullYear()+'-'+padNum(now.getMonth()+1)]=true;
var monthsAll=Object.keys(monthSetS).sort();
var totalDaysCount=0,above70Count=0;
monthsAll.forEach(function(ym){
var parts=ym.split('-'),yr2=parseInt(parts[0]),mn2=parseInt(parts[1])-1;
var dim2=getDaysInMonth(yr2,mn2);
var isCurrentMonth=(yr2===now.getFullYear()&&mn2===now.getMonth());
var daysToCount=isCurrentMonth?now.getDate():dim2;
totalDaysCount+=daysToCount;
for(var day=1;day<=daysToCount;day++){
var ds=yr2+'-'+padNum(mn2+1)+'-'+padNum(day);
var dc1=completions[ds]?completions[ds].length:0;
var pctDay=goals.length>0?dc1/goals.length*100:0;
if(pctDay>=70)above70Count++;
if(pctDay>=50)totalDone++;
}
});
avgPct=totalDaysCount>0?Math.round(above70Count/totalDaysCount*100):0;
}
var checkD=new Date();
while(true){var dsc=checkD.getFullYear()+'-'+padNum(checkD.getMonth()+1)+'-'+padNum(checkD.getDate());var dcc=completions[dsc]?completions[dsc].length:0;if(goals.length>0&&dcc===goals.length){streak++;checkD.setDate(checkD.getDate()-1);}else break;}
var statLbl1=metricsRange===7?'% Met':'Days 70%+';
var statLbl2=metricsRange===7?'Total Done':'Colored Days';
var statsHtml='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px;">'
+'<div style="background:white;border-radius:14px;padding:14px 8px;text-align:center;border:1.5px solid #ddeee9;"><div style="font-size:22px;font-weight:800;color:#e74c3c;line-height:1;">'+avgPct+'%</div><div style="font-size:10px;color:#aaa;font-weight:600;margin-top:4px;">'+statLbl1+'</div></div>'
+'<div style="background:white;border-radius:14px;padding:14px 8px;text-align:center;border:1.5px solid #ddeee9;"><div style="font-size:22px;font-weight:800;color:#27ae60;line-height:1;">'+totalDone+'</div><div style="font-size:10px;color:#aaa;font-weight:600;margin-top:4px;">'+statLbl2+'</div></div>'
+'<div style="background:white;border-radius:14px;padding:14px 8px;text-align:center;border:1.5px solid #ddeee9;"><div style="font-size:22px;font-weight:800;color:#f39c12;line-height:1;">&#128293;'+streak+'<span style="font-size:11px">d</span></div><div style="font-size:10px;color:#aaa;font-weight:600;margin-top:4px;">Streak</div></div>'
+'</div>';
var gridHtml='';
if(metricsRange===7){
var WDL=['S','M','T','W','T','F','S'];
var hdr='<div style="display:flex;align-items:center;padding-bottom:8px;border-bottom:1px solid #f0f0ea;margin-bottom:2px;">'
+'<div style="flex:1;min-width:0;"></div>'
+'<div style="display:flex;gap:5px;flex-shrink:0;">'
+days.map(function(d,i){return '<div style="width:26px;text-align:center;font-size:11px;font-weight:700;color:#b0b8c1;">'+WDL[i]+'</div>';}).join('')
+'</div>'
+'<div style="width:30px;text-align:center;font-size:14px;color:#e0e0e0;flex-shrink:0;padding-left:6px;">&#9733;</div>'
+'</div>';
var rows=goals.map(function(g){
var cat=CATS[g.category];var weekDone=0;
var dots=days.map(function(d){var done=completions[d]&&completions[d].indexOf(g.id)!==-1;if(done)weekDone++;return '<div style="width:26px;height:26px;border-radius:8px;flex-shrink:0;background:'+(done?cat.color:'#e8e8e3')+';'+(done?'box-shadow:0 2px 5px '+cat.color+'44;':'')+'"></div>';}).join('');
var starCol=weekDone===7?'#FFD700':'#e0e0e0';
return '<div style="display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #f7f7f2;">'
+'<div style="flex:1;min-width:0;font-size:12px;font-weight:600;color:#333;display:flex;align-items:center;gap:5px;">'
+'<span style="flex-shrink:0;font-size:16px;">'+cat.icon+'</span>'
+'<span style="white-space:nowrap;">'+shortGoalName(g.text)+'</span>'
+'</div>'
+'<div style="display:flex;gap:5px;flex-shrink:0;">'+dots+'</div>'
+'<div style="width:30px;text-align:center;font-size:18px;color:'+starCol+';flex-shrink:0;padding-left:4px;line-height:1;">&#9733;</div>'
+'</div>';
}).join('');
gridHtml='<div style="background:white;border-radius:18px;padding:16px 14px;box-shadow:0 2px 8px rgba(45,122,107,0.06);border:1.5px solid #ddeee9;overflow:hidden;">'+hdr+rows+'</div>';
}else{
var monthSet={};
Object.keys(completions).forEach(function(date){if(completions[date]&&completions[date].length)monthSet[date.slice(0,7)]=true;});
monthSet[now.getFullYear()+'-'+padNum(now.getMonth()+1)]=true;
var months2=Object.keys(monthSet).sort().reverse();
var CDL=['S','M','T','W','T','F','S'];
var cals=months2.map(function(ym){
var parts=ym.split('-'),yr2=parseInt(parts[0]),mn2=parseInt(parts[1])-1;
var dim2=getDaysInMonth(yr2,mn2);
var firstDow=new Date(yr2,mn2,1).getDay();
var cells='';
for(var d2=0;d2<firstDow;d2++)cells+='<div style="width:14.28%;padding-bottom:14.28%;"></div>';
for(var day=1;day<=dim2;day++){
var ds=yr2+'-'+padNum(mn2+1)+'-'+padNum(day);
var dc=completions[ds]?completions[ds].length:0;
var tp=goals.length;var pct2=tp>0?dc/tp*100:0;
var bg='transparent',col='#bbb';
if(dc>0){if(pct2>=100){bg='#72C27A';col='#2d6b40';}else if(pct2>=70){bg='#B5DDAA';col='#3d7a4e';}else if(pct2>=50){bg='#FFD966';col='#8a6a00';}}
cells+='<div style="width:14.28%;padding-bottom:14.28%;position:relative;"><div style="position:absolute;inset:2px;border-radius:6px;background:'+bg+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:'+col+';">'+day+'</div></div>';
}
return '<div style="background:white;border-radius:18px;padding:16px;box-shadow:0 2px 8px rgba(45,122,107,0.06);border:1.5px solid #ddeee9;margin-bottom:12px;">'
+'<div style="font-size:13px;font-weight:800;color:#1a1a1a;margin-bottom:10px;">'+MONTH_NAMES[mn2]+' '+yr2+'</div>'
+'<div style="display:flex;margin-bottom:4px;">'
+CDL.map(function(l){return '<div style="width:14.28%;text-align:center;font-size:10px;font-weight:700;color:#b0b8c1;">'+l+'</div>';}).join('')
+'</div>'
+'<div style="display:flex;flex-wrap:wrap;">'+cells+'</div>'
+'</div>';
}).join('');
gridHtml=cals;
}
document.getElementById('metrics-content').innerHTML=gridHtml+statsHtml;
}

function showJournalForm(){
            var today=todayStr();
            var existing=journal.find(function(e){return e.date===today;});
            document.getElementById("journal-compose-area").innerHTML=
                "<div class='journal-compose'><p class='journal-compose-label'>Today's Highlight</p>"
                +"<textarea id='journal-input' placeholder='What stood out to you today?'>"+(existing?existing.text:"")+"</textarea>"
                +"<div class='form-btns' style='margin-top:10px;'>"
                +"<button class='btn-cancel' onclick='hideJournalForm()'>Cancel</button>"
                +"<button class='btn-save' onclick='saveJournal()'>Save Entry</button>"
                +"</div></div>";
            document.getElementById("journal-input").focus();
        }
        function hideJournalForm(){
            document.getElementById("journal-compose-area").innerHTML="<button class='journal-add-btn' onclick='showJournalForm()'>&#43; Add New Entry</button>";
        }
        function saveJournal(){
            var text=document.getElementById("journal-input").value.trim();
            if(!text)return;
            var today=todayStr();
            journal=journal.filter(function(e){return e.date!==today;});
            journal.unshift({date:today,text:text});
            saveJournalState();hideJournalForm();renderJournal();
        }
        function deleteJournal(date){
            journal=journal.filter(function(e){return e.date!==date;});
            saveJournalState();renderJournal();
        }
        function renderJournal(){
            var today=todayStr();
            var list=document.getElementById("journal-list");
            if(!journal.length){
                list.innerHTML="<div class='empty'>No entries yet &#10024;<br><span style='font-size:13px;opacity:0.7'>Tap above to write your first one!</span></div>";
                return;
            }
            list.innerHTML=journal.map(function(e){
                var d=new Date(e.date+"T12:00:00");
                var label=d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
                var isToday=e.date===today;
                return "<div class='journal-entry'>"
                    +"<div class='journal-entry-date'>"+label
                    +(isToday?"<span class='today-badge'>TODAY</span>":"")
                    +"<button class='journal-entry-del' onclick='deleteJournal(\""+e.date+"\")'>&times;</button></div>"
                    +"<p class='journal-entry-text'>"+e.text+"</p></div>";
            }).join("");
        }

        renderGoals();
        renderMetrics();
    </script>
